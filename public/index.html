<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>PulseTrade Live</title>
  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      text-align: center;
      padding-top: 100px;
    }
    button {
      padding: 15px 25px;
      margin: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }
    .green { background: #22c55e; }
    .blue { background: #3b82f6; }
    .red { background: #ef4444; }
  </style>
</head>
<body>

  <h1>🚀 PulseTrade LIVE</h1>

  <button class="green" onclick="fetch('/api/start', {method:'POST'})">
    Avvia Monitor
  </button>

  <button class="red" onclick="fetch('/api/stop', {method:'POST'})">
    Ferma Monitor
  </button>

  <button class="white" onclick="fetch('/api/telegram/test', {method:'POST'})">
    Test Telegram
  </button>

  <button class="white" onclick="fetch('/api/binance/ping')">
    Ping Binance
  </button>

  <p id="status"></p>

  <script>
    setInterval(async () => {
      const res = await fetch('/api/state');
      const data = await res.json();
      document.getElementById('status').innerText =
        "Monitor: " + (data.running ? "ATTIVO" : "FERMO");
    }, 2000);
  </script>

</body>
</html>
